server:
  port: 8080 # Port standard interne (exposé via Docker ou direct)
  forward-headers-strategy: framework

# Config Swagger
app:
  swagger:
    server-url: ${ORGANIZATION_SERVER_URL:https://traefikdev.yowyob.com/organization}
    
spring:
  application:
    name: organization-service

   # Désactive Docker Compose automatique (on gère l'infra manuellement ou via script)
  docker:
    compose:
      enabled: false

  # ------------------------------------------------------------------
  # DATABASE — Liquibase
  # ------------------------------------------------------------------
  liquibase:
    url: jdbc:postgresql://${DB_HOST}:${DB_PORT:5432}/${DB_NAME:yowyob}
    user: ${DB_LIQUIBASE_USERNAME}
    password: ${DB_LIQUIBASE_PASSWORD}
    enabled: true
  # ------------------------------------------------------------------
  # DATABASE — R2DBC réactif
  # ------------------------------------------------------------------
  r2dbc:
    url: r2dbc:postgresql://${DB_HOST}:${DB_PORT:5432}/${DB_NAME:yowyob}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    pool:
      enabled: true
      initial-size: 5
      max-size: 20
      max-idle-time: 30m
      validation-query: SELECT 1

  sql:
    init:
      mode: never

  # ------------------------------------------------------------------
  # REDIS CLUSTER
  # ------------------------------------------------------------------
  data:
    redis:
      username: ${REDIS_USERNAME}
      password: ${REDIS_PASSWORD}
      cluster:
        nodes:
          - redis-node-1:6379
          - redis-node-2:6379
          - redis-node-3:6379
          - redis-node-4:6379
          - redis-node-5:6379
          - redis-node-6:6379
        max-redirects: 3
      lettuce:
        pool:
          max-active: 16
          max-idle: 8
          min-idle: 2
        cluster:
          refresh:
            adaptive: true
            period: 30s
            dynamic-refresh-sources: false

  # --- KAFKA PROD ---
  kafka:
    bootstrap-servers: ${KAFKA_HOST}:${KAFKA_PORT:29092}

    # ── Authentification SASL/SCRAM-SHA-256 ────────────────────────
    properties:
      security.protocol: SASL_PLAINTEXT
      sasl.mechanism: SCRAM-SHA-256
      sasl.jaas.config: >
        org.apache.kafka.common.security.scram.ScramLoginModule required
        username="${KAFKA_BACKEND_USER}"
        password="${KAFKA_BACKEND_PASSWORD}";

    consumer:
      group-id: organisation-group-prod
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      properties:
        spring.json.trusted.packages: "*"
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer 

# --- MONITORING (Actuator - Comme le Template) ---
management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  endpoint:
    health:
      probes:
        enabled: true
  metrics:
    export:
      prometheus:
        enabled: true

# --- SWAGGER (SpringDoc) ---
springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    validator-url: none
  use-fqn: true

# --- CONFIGS MÉTIER ---
application:
  kafka:
    topics:
      crm-interactions: crm-interactions
      organization-events: organization-events
  
  security:
    jwt:
      secret: 404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970
  cors:
    allowed-origins: "https://traefikdev.yowyob.com/organization"
      
# --- RESILIENCE (Circuit Breaker - Comme le Template) ---
resilience4j:
  circuitbreaker:
    instances:
      external-service: # Exemple générique
        failureRateThreshold: 50
        waitDurationInOpenState: 5s
        slidingWindowSize: 5
  
